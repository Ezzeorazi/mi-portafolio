name: Post semanal de Noticias Tech

# Corre todos los miércoles a las 11:00 UTC (08:00 Argentina).
# También se puede disparar a mano desde la pestaña "Actions" → "Run workflow".
on:
  schedule:
    - cron: '0 11 * * 3'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generar el post
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generar-noticias.mjs

      - name: Commit y push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -z "$(git status --porcelain)" ]; then
            echo "ℹ️ Sin cambios que commitear."
            exit 0
          fi
          git add data/posts.ts content/blog public/images/blog
          git commit -m "blog: post automático de Noticias Tech ($(date -u +%Y-%m-%d))"
          # Reintentar el push rebasando por si origin/main avanzó durante la corrida.
          for intento in 1 2 3 4 5; do
            if git push; then
              echo "✅ Post publicado. Netlify reconstruirá el sitio."
              exit 0
            fi
            echo "⚠️ Push rechazado (intento $intento). Rebaso sobre origin/main y reintento…"
            git pull --rebase origin main
          done
          echo "❌ No se pudo pushear tras varios intentos."
          exit 1
