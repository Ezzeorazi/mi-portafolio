<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="42%" r="50%">
      <stop offset="0%" stop-color="#D97757" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#1A1612" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft-blur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#1A1612"/>

  <!-- Warm glow behind logo -->
  <circle cx="600" cy="250" r="160" fill="#D97757" fill-opacity="0.13" filter="url(#soft-blur)"/>

  <!-- Radial gradient overlay -->
  <rect width="1200" height="630" fill="url(#bg-glow)"/>

  <!-- Claude logo mark: 12 pill segments radially arranged, gap at ~45°-75° -->
  <!-- Each segment: 16×68px, rx=8, centered at radius ~58 from origin -->
  <!-- transform: translate(cx,cy) rotate(deg) then segment at x=-8,y=-90 w=16 h=68 -->

  <!-- 0° top — faded -->
  <rect x="-8" y="-90" width="16" height="66" rx="8" fill="#D97757" fill-opacity="0.45"
        transform="translate(600,252) rotate(0)"/>
  <!-- 30° — very faded, approaching gap -->
  <rect x="-8" y="-90" width="16" height="66" rx="8" fill="#D97757" fill-opacity="0.2"
        transform="translate(600,252) rotate(30)"/>
  <!-- 60° — near-invisible gap zone -->
  <rect x="-8" y="-90" width="16" height="66" rx="8" fill="#D97757" fill-opacity="0.07"
        transform="translate(600,252) rotate(60)"/>
  <!-- 90° right — full -->
  <rect x="-8" y="-90" width="16" height="66" rx="8" fill="#D97757" fill-opacity="1"
        transform="translate(600,252) rotate(90)"/>
  <!-- 120° -->
  <rect x="-8" y="-90" width="16" height="66" rx="8" fill="#D97757" fill-opacity="1"
        transform="translate(600,252) rotate(120)"/>
  <!-- 150° -->
  <rect x="-8" y="-90" width="16" height="66" rx="8" fill="#D97757" fill-opacity="1"
        transform="translate(600,252) rotate(150)"/>
  <!-- 180° bottom -->
  <rect x="-8" y="-90" width="16" height="66" rx="8" fill="#D97757" fill-opacity="1"
        transform="translate(600,252) rotate(180)"/>
  <!-- 210° -->
  <rect x="-8" y="-90" width="16" height="66" rx="8" fill="#D97757" fill-opacity="1"
        transform="translate(600,252) rotate(210)"/>
  <!-- 240° -->
  <rect x="-8" y="-90" width="16" height="66" rx="8" fill="#D97757" fill-opacity="1"
        transform="translate(600,252) rotate(240)"/>
  <!-- 270° left -->
  <rect x="-8" y="-90" width="16" height="66" rx="8" fill="#D97757" fill-opacity="0.9"
        transform="translate(600,252) rotate(270)"/>
  <!-- 300° -->
  <rect x="-8" y="-90" width="16" height="66" rx="8" fill="#D97757" fill-opacity="0.75"
        transform="translate(600,252) rotate(300)"/>
  <!-- 330° — recovering from gap -->
  <rect x="-8" y="-90" width="16" height="66" rx="8" fill="#D97757" fill-opacity="0.58"
        transform="translate(600,252) rotate(330)"/>

  <!-- Horizontal rule above text -->
  <line x1="240" y1="388" x2="960" y2="388" stroke="#D97757" stroke-width="1" stroke-opacity="0.3"/>

  <!-- CLAUDE main text -->
  <text x="600" y="450" text-anchor="middle" fill="#F0EDE8"
        font-size="92" font-family="Georgia, 'Times New Roman', serif"
        font-weight="bold" letter-spacing="22">CLAUDE</text>

  <!-- Subtitle -->
  <text x="600" y="498" text-anchor="middle" fill="#D97757"
        font-size="24" font-family="Georgia, 'Times New Roman', serif"
        letter-spacing="6" font-style="italic">Guía para Profesionales — Parte 1</text>

  <!-- by Anthropic -->
  <text x="600" y="538" text-anchor="middle" fill="#F0EDE8"
        font-size="16" font-family="Georgia, 'Times New Roman', serif"
        fill-opacity="0.3" letter-spacing="3">by Anthropic</text>

  <!-- Corner brackets — top left -->
  <line x1="52" y1="52" x2="110" y2="52" stroke="#D97757" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="52" y1="52" x2="52" y2="110" stroke="#D97757" stroke-width="1.5" stroke-opacity="0.5"/>
  <!-- top right -->
  <line x1="1148" y1="52" x2="1090" y2="52" stroke="#D97757" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="1148" y1="52" x2="1148" y2="110" stroke="#D97757" stroke-width="1.5" stroke-opacity="0.5"/>
  <!-- bottom left -->
  <line x1="52" y1="578" x2="110" y2="578" stroke="#D97757" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="52" y1="578" x2="52" y2="520" stroke="#D97757" stroke-width="1.5" stroke-opacity="0.5"/>
  <!-- bottom right -->
  <line x1="1148" y1="578" x2="1090" y2="578" stroke="#D97757" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="1148" y1="578" x2="1148" y2="520" stroke="#D97757" stroke-width="1.5" stroke-opacity="0.5"/>
</svg>
